<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 寵物意識溝通器 | 量子解碼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #050508; /* 極深宇宙底色 */
        }

        /* 畫布定位 */
        #starCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        /* 宇宙深處的星雲霧氣 */
        .nebula {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 30% 20%, rgba(63, 0, 113, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 70% 80%, rgba(0, 70, 120, 0.15) 0%, transparent 40%);
            z-index: -2;
            filter: blur(50px);
        }

        /* 毛玻璃面板升級 */
        .glass-panel {
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .neon-btn {
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .neon-btn:hover:not(:disabled) {
            box-shadow: 0 0 35px rgba(51, 51, 255, 0.6);
            transform: scale(1.02) translateY(-2px);
        }

        #photoPreview {
            max-width: 140px; max-height: 140px;
            border-radius: 50%; object-fit: cover;
            border: 2px solid #00ffff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
            display: none; margin: 0 auto 1.5rem auto;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-gray-200 antialiased font-mono">
    
    <canvas id="starCanvas"></canvas>
    <div class="nebula"></div>
    
    <div class="glass-panel p-10 rounded-[2rem] max-w-lg w-full text-center relative overflow-hidden">
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-purple-400 to-pink-300 mb-2 tracking-widest uppercase">
            AI PET TELEPATHY INTERFACE
        </h1>
        <p class="text-[10px] text-cyan-300 opacity-60 mb-8 tracking-[0.2em]">AI寵物意識溝通器 v1.2 • 量子糾纏態調頻</p>

        <div class="mb-6 relative z-10">
            <img id="photoPreview" src="" alt="寵物圖像預覽">
            <label class="block text-xs font-bold text-purple-300 mb-2 uppercase tracking-tighter">上傳寵物圖像</label>
            <input type="file" id="photoInput" accept="image/*" onchange="previewImage(this)" class="block w-full text-[10px] text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-gray-800 file:text-cyan-400 hover:file:bg-gray-700 cursor-pointer"/>
        </div>

        <div class="mb-6 relative z-10 text-left">
            <label class="block text-xs font-bold text-purple-300 mb-2 uppercase tracking-tighter ml-1">向宇宙投射靈魂探詢</label>
            <textarea id="questionInput" placeholder="在此輸入你的問題..." class="w-full p-4 bg-black/40 border border-white/10 rounded-2xl mb-4 focus:ring-1 focus:ring-cyan-500/50 outline-none transition text-sm h-28 placeholder:text-gray-700"></textarea>
        </div>

        <button onclick="startCommunication()" id="actionBtn" class="neon-btn w-full text-white py-4 rounded-2xl font-black tracking-widest text-xs uppercase relative z-10">
            啟動量子糾纏連結
        </button>

        <div id="loading" class="hidden mt-10 text-cyan-400 animate-pulse text-[10px] tracking-widest">
            [系統訊息] 正在演算量子糾纏態，透過 AI 大數據調頻中...
        </div>
        
        <div id="result" class="hidden mt-8 p-6 bg-white/5 border border-white/10 rounded-2xl text-left relative z-10">
            <p class="font-bold text-cyan-300 mb-3 text-[10px] tracking-widest">[量子意識回饋]</p>
            <p id="responseText" class="text-gray-100 text-sm leading-loose italic"></p>
            <div class="mt-4 flex justify-between items-center opacity-30 text-[9px]">
                <span>連結完整度: 98.42%</span>
                <span>共振頻率: <span id="randomFreq"></span> PHz</span>
            </div>
        </div>
        
        <p class="mt-10 text-[9px] text-gray-600 tracking-widest leading-relaxed">
            此介面為實驗性裝置。內容源於量子隨機共振。
        </p>
    </div>

    <script src="script.js"></script>
    <script>
        function previewImage(input) {
            const preview = document.getElementById('photoPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
